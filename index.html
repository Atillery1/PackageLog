<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackageTracker Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007AFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="PackageTracker Pro">
</head>
<body>
    <div class="app-container">
        <!-- Navigation Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="app-title">
                    <i class="fas fa-box"></i>
                    PackageTracker Pro
                </h1>
                <button class="profile-btn" id="profileBtn">
                    <i class="fas fa-user-circle"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Dashboard View -->
            <div class="view" id="dashboardView">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-inbox"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-number" id="totalPackages">0</span>
                            <span class="stat-label">Total Packages</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-number" id="todayPackages">0</span>
                            <span class="stat-label">Today</span>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="primary-btn scan-btn" id="scanBtn">
                        <i class="fas fa-qrcode"></i>
                        Scan Package
                    </button>
                    <button class="secondary-btn manual-btn" id="manualBtn">
                        <i class="fas fa-plus"></i>
                        Add Manually
                    </button>
                </div>

                <div class="recent-section">
                    <h2 class="section-title">Recent Packages</h2>
                    <div class="package-list" id="packageList">
                        <!-- Packages will be dynamically added here -->
                    </div>
                </div>
            </div>

            <!-- Scan View -->
            <div class="view" id="scanView" style="display: none;">
                <div class="scan-container">
                    <div class="scan-header">
                        <button class="back-btn" id="backToMain">
                            <i class="fas fa-arrow-left"></i>
                        </button>
                        <h2>Scan Package</h2>
                    </div>
                    
                    <div class="camera-container">
                        <video id="cameraFeed" autoplay playsinline></video>
                        <div class="scan-overlay">
                            <div class="scan-frame"></div>
                            <p class="scan-instruction">Position barcode within the frame</p>
                        </div>
                    </div>
                    
                    <div class="scan-actions">
                        <button class="scan-action-btn" id="captureBtn">
                            <i class="fas fa-camera"></i>
                            Capture
                        </button>
                        <button class="scan-action-btn" id="switchCameraBtn">
                            <i class="fas fa-sync-alt"></i>
                            Switch
                        </button>
                        <button class="scan-action-btn" id="manualEntryBtn">
                            <i class="fas fa-keyboard"></i>
                            Manual
                        </button>
                    </div>
                </div>
            </div>

            <!-- Package Form View -->
            <div class="view" id="formView" style="display: none;">
                <div class="form-container">
                    <div class="form-header">
                        <button class="back-btn" id="backFromForm">
                            <i class="fas fa-arrow-left"></i>
                        </button>
                        <h2>Package Details</h2>
                    </div>
                    
                    <form class="package-form" id="packageForm">
                        <div class="form-group">
                            <label for="trackingNumber">Tracking Number</label>
                            <input type="text" id="trackingNumber" placeholder="Enter tracking number" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="carrier">Carrier</label>
                            <select id="carrier" required>
                                <option value="">Select carrier</option>
                                <option value="amazon">Amazon</option>
                                <option value="fedex">FedEx</option>
                                <option value="ups">UPS</option>
                                <option value="usps">USPS</option>
                                <option value="dhl">DHL</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="recipientName">Recipient Name</label>
                            <input type="text" id="recipientName" placeholder="Enter recipient name" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="recipientPhone">Phone Number</label>
                            <input type="tel" id="recipientPhone" placeholder="Enter phone number" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="location">Storage Location</label>
                            <input type="text" id="location" placeholder="Where is the package placed?" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="receivedBy">Received By</label>
                            <input type="text" id="receivedBy" placeholder="Who received the package?" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="notes">Notes (Optional)</label>
                            <textarea id="notes" placeholder="Additional notes..." rows="3"></textarea>
                        </div>
                        
                        <button type="submit" class="primary-btn submit-btn">
                            <i class="fas fa-save"></i>
                            Save Package
                        </button>
                    </form>
                </div>
            </div>
        </main>

        <!-- Toast Notifications -->
        <div class="toast" id="toast">
            <div class="toast-content">
                <i class="toast-icon"></i>
                <span class="toast-message"></span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
